<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 500" font-family="Inter, Segoe UI, Arial, sans-serif">
  <rect width="980" height="500" rx="16" fill="#0b1020"/>
  <text x="490" y="42" fill="#e7edf8" font-size="22" font-weight="700" text-anchor="middle">Process Flow — how Aanya answers</text>

  <!-- input -->
  <rect x="30" y="210" width="150" height="80" rx="12" fill="#101a2e" stroke="#22e3c8" stroke-width="1.5"/>
  <text x="105" y="245" fill="#e7edf8" font-size="14" font-weight="600" text-anchor="middle">Customer</text>
  <text x="105" y="265" fill="#8a99b7" font-size="12" text-anchor="middle">type or speak</text>

  <!-- router -->
  <rect x="225" y="205" width="160" height="90" rx="12" fill="#101a2e" stroke="#a472ff" stroke-width="1.5"/>
  <text x="305" y="240" fill="#e7edf8" font-size="14" font-weight="600" text-anchor="middle">Intent router</text>
  <text x="305" y="260" fill="#8a99b7" font-size="11.5" text-anchor="middle">data Q? · parses</text>
  <text x="305" y="276" fill="#8a99b7" font-size="11.5" text-anchor="middle">amount / horizon</text>

  <!-- arrows input->router -->
  <line x1="180" y1="250" x2="223" y2="250" stroke="#5a6b85" stroke-width="2"/>
  <polygon points="223,250 213,245 213,255" fill="#5a6b85"/>

  <!-- branch top: data -> quant -> chart -->
  <line x1="385" y1="230" x2="430" y2="150" stroke="#5a6b85" stroke-width="2"/>
  <polygon points="430,150 419,153 425,161" fill="#5a6b85"/>
  <rect x="430" y="110" width="170" height="78" rx="12" fill="#101a2e" stroke="#ffb02e" stroke-width="1.5"/>
  <text x="515" y="142" fill="#ffb02e" font-size="13" font-weight="700" text-anchor="middle">Quant engine + RAG</text>
  <text x="515" y="162" fill="#8a99b7" font-size="11.5" text-anchor="middle">risk · goals · insights</text>
  <text x="515" y="178" fill="#8a99b7" font-size="11.5" text-anchor="middle">grounded products</text>

  <line x1="600" y1="149" x2="660" y2="149" stroke="#5a6b85" stroke-width="2"/>
  <polygon points="660,149 650,144 650,154" fill="#5a6b85"/>
  <rect x="660" y="110" width="150" height="78" rx="12" fill="#13243d" stroke="#22e3c8" stroke-width="1.5"/>
  <text x="735" y="146" fill="#e7edf8" font-size="13" font-weight="600" text-anchor="middle">Chart answer</text>
  <text x="735" y="166" fill="#8a99b7" font-size="11.5" text-anchor="middle">donut · line · gauge</text>

  <!-- branch bottom: open -> agent -> guardrail -> reply -->
  <line x1="385" y1="270" x2="430" y2="350" stroke="#5a6b85" stroke-width="2"/>
  <polygon points="430,350 419,347 425,339" fill="#5a6b85"/>
  <rect x="430" y="330" width="170" height="78" rx="12" fill="#101a2e" stroke="#ff5cc8" stroke-width="1.5"/>
  <text x="515" y="362" fill="#ff5cc8" font-size="13" font-weight="700" text-anchor="middle">Claude agent</text>
  <text x="515" y="382" fill="#8a99b7" font-size="11.5" text-anchor="middle">tool-calling loop</text>
  <text x="515" y="398" fill="#8a99b7" font-size="11.5" text-anchor="middle">claude-opus-4-8</text>

  <line x1="600" y1="369" x2="635" y2="369" stroke="#5a6b85" stroke-width="2"/>
  <polygon points="635,369 625,364 625,374" fill="#5a6b85"/>
  <rect x="635" y="330" width="135" height="78" rx="12" fill="#2a1430" stroke="#ff5cc8" stroke-width="1.5"/>
  <text x="702" y="360" fill="#ffb0d8" font-size="13" font-weight="700" text-anchor="middle">Guardrails</text>
  <text x="702" y="380" fill="#8a99b7" font-size="11" text-anchor="middle">no fake returns,</text>
  <text x="702" y="395" fill="#8a99b7" font-size="11" text-anchor="middle">only real products</text>

  <!-- converge to output -->
  <rect x="820" y="218" width="140" height="80" rx="12" fill="#13243d" stroke="#2fe39a" stroke-width="1.5"/>
  <text x="890" y="250" fill="#e7edf8" font-size="13" font-weight="600" text-anchor="middle">3D avatar</text>
  <text x="890" y="270" fill="#8a99b7" font-size="11.5" text-anchor="middle">speaks + shows card</text>

  <line x1="810" y1="149" x2="890" y2="149" stroke="#5a6b85" stroke-width="2"/>
  <line x1="890" y1="149" x2="890" y2="216" stroke="#5a6b85" stroke-width="2"/>
  <polygon points="890,216 885,206 895,206" fill="#5a6b85"/>
  <line x1="770" y1="369" x2="890" y2="369" stroke="#5a6b85" stroke-width="2"/>
  <line x1="890" y1="369" x2="890" y2="300" stroke="#5a6b85" stroke-width="2"/>
  <polygon points="890,300 885,310 895,310" fill="#5a6b85"/>

  <text x="490" y="470" fill="#8a99b7" font-size="12" text-anchor="middle">Data questions are answered instantly as charts (offline); open-ended questions use the guarded LLM agent.</text>
</svg>
